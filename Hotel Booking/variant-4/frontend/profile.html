<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Hotel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">
  <nav class="nav">
    <span class="brand">🏨 Hotel</span>
    <a class="link" href="rooms.html">Номера</a>
    <a class="link" href="profile.html">Мои бронирования / Профиль</a>
    <span class="spacer"></span>
    <span class="user" id="userName"></span>
    <a class="link" id="authLink" href="login.html">Войти</a>
  </nav>
  <div class="container">
    <div class="profile-head">
      <img class="avatar" id="pAvatar" alt="">
      <div>
        <h2 id="pName" style="margin:0"></h2>
        <div class="meta" id="pLogin" style="color:#666"></div>
        <form id="avatarForm" style="margin-top:10px;display:flex;gap:8px;align-items:center">
          <input type="file" name="avatar" accept=".jpg,.jpeg,.png" style="max-width:240px">
          <button class="btn small" type="submit">Загрузить фото</button>
        </form>
        <div id="avatarMsg" class="msg"></div>
      </div>
    </div>
    <h2>Мои бронирования</h2>
    <div id="bookings"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
