<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Афиша — Cinema</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="movies">
  <nav class="nav">
    <span class="brand">🎬 Cinema</span>
    <a class="link" href="movies.html">Афиша</a>
    <a class="link" href="profile.html">Мои билеты / Профиль</a>
    <span class="spacer"></span>
    <span class="user" id="userName"></span>
    <a class="link" id="authLink" href="login.html">Войти</a>
  </nav>
  <div class="container">
    <h1>Афиша фильмов</h1>
    <form class="filters" id="filters">
      <div class="field">
        <label>Жанр</label>
        <select name="genre">
          <option value="">Все жанры</option>
          <option value="1">Боевик</option>
          <option value="2">Комедия</option>
          <option value="3">Драма</option>
        </select>
      </div>
      <div class="field">
        <label>Возрастной рейтинг</label>
        <select name="age_rating">
          <option value="">Любой</option>
          <option value="6">6+</option>
          <option value="12">12+</option>
          <option value="16">16+</option>
          <option value="18">18+</option>
        </select>
      </div>
      <div class="field">
        <label>Сортировка по цене</label>
        <select name="sort">
          <option value="">По умолчанию</option>
          <option value="price_asc">Дешевле</option>
          <option value="price_desc">Дороже</option>
        </select>
      </div>
      <div class="field">
        <label>Поиск</label>
        <input name="q" placeholder="Название фильма">
      </div>
      <button class="btn" type="submit">Найти</button>
    </form>
    <div class="grid" id="grid"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
